# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Release & Publish

on:
  schedule:
    # GitHub Actions cron uses UTC.
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version to publish (e.g. 1.2.3). Leave empty to auto-increment the patch version.'
        default: ''
        type: string
      geminiModel:
        description: 'Gemini model to use (e.g., gemini-2.5-flash-lite, gemini-2.5-flash)'
        required: false
        default: 'gemini-2.5-flash-lite'
        type: string

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create releases and write RELEASE_NOTES.md
      id-token: write   # required for OIDC token (Gemini CLI auth)

    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history needed to collect commits since last tag

      - name: Set up Java & Maven
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish GPG public key to keyservers
        run: |
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep '^sec' | awk '{print $2}' | cut -d'/' -f2 | head -1)
          echo "Publishing GPG public key: $KEY_ID"
          # gpg --keyserver keyserver.ubuntu.com --send-keys "$KEY_ID" || true
          # gpg --keyserver keys.openpgp.org --send-keys "$KEY_ID" || true
          # gpg --keyserver pgp.mit.edu --send-keys "$KEY_ID" || true

      - name: setup git properties for preparation
        run: |
          git config --global user.email "ramachandrannellai@gmail.com"
          git config --global user.name "Deploy Bot"

      - name: Resolve Release Version
        id: resolve_version
        run: |
          INPUT_VERSION="${{ github.event.inputs.releaseVersion }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "RELEASE_VERSION_ARGS=-DreleaseVersion=$INPUT_VERSION" >> "$GITHUB_ENV"
          else
            # Derive version from pom.xml: strip the -SNAPSHOT suffix
            SNAPSHOT_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec 2>/dev/null)
            RELEASE_VERSION="${SNAPSHOT_VERSION%-SNAPSHOT}"
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "RELEASE_VERSION_ARGS=" >> "$GITHUB_ENV"
          fi

      - name: Generate Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          skip-on-empty: 'false'
          skip-tag: 'true'          # Maven handles tag creation
          skip-commit: 'true'       # do not commit changelog
          git-push: 'false'         # do not push

      - name: Prepare Release
        run: |
          mvn -B --no-transfer-progress -Pgithub -DpushChanges=true \
            release:prepare release:perform \
            -DscmCommentPrefix="chore:" \
            -Dgpg.passphrase=${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }} \
            ${{ env.RELEASE_VERSION_ARGS }}
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}

      - name: Get Released version
        id: released_version
        run: |
          git fetch --tags
          RELEASED_TAG=$(git describe --tags $(git rev-list --tags --max-count=1))
          echo "tag=${RELEASED_TAG}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${RELEASED_TAG}" >> "$GITHUB_ENV"
          echo "Released Version: ${RELEASED_TAG}"

      - name: Get previous tag
        id: get_prev_tag
        run: |
          CURRENT_TAG="${{ steps.released_version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare Release Context for Gemini
        run: |
          mkdir -p .gemini
          {
            echo "- **Repository**: ${{ github.repository }}"
            echo "- **Commit Range**: ${{ steps.get_prev_tag.outputs.tag }}..${{ steps.released_version.outputs.tag }}"
            echo "- **Base Changelog**:"
            echo ""
            printf '%s\n' "$CLEAN_CHANGELOG"
          } > .gemini/release-context.md
        env:
          CLEAN_CHANGELOG: ${{ steps.changelog.outputs.clean_changelog }}

      - name: Generate AI-Enhanced Release Notes with Gemini
        id: ai_release_notes
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_model: ${{ github.event.inputs.geminiModel != '' && github.event.inputs.geminiModel || vars.GEMINI_MODEL }}
          workflow_name: 'gemini-release-notes'
          upload_artifacts: 'true'
          settings: |-
            {
              "autoAccept": true,
              "model": {
                "maxSessionTurns": 100
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              }
            }
          prompt: '/gemini-release-notes'

      - name: Read Release Notes
        id: read_release_notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            NOTES="$(cat RELEASE_NOTES.md)"
          elif [ -n "${{ steps.changelog.outputs.clean_changelog }}" ]; then
            NOTES="${{ steps.changelog.outputs.clean_changelog }}"
          else
            NOTES="No impactful changes in this release."
          fi
          delimiter="__RELEASE_NOTES_EOF__"
          echo "notes<<$delimiter" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"

      - name: Create Release with Notes
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.released_version.outputs.tag }}
          name: ${{ steps.released_version.outputs.tag }}
          commit: main
          body: ${{ steps.read_release_notes.outputs.notes }}
          draft: false
          prerelease: false
          token: ${{ secrets.DEPLOY_TOKEN }}
          allowUpdates: true
