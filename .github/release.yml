changelog:
  categories:
    - title: '🚀 Features'
      labels:
        - 'feature'
        - 'enhancement'
    - title: '🐛 Bug Fixes'
      labels:
        - 'bug'
        - 'fix'
    - title: '⚠️ Breaking Changes'
      labels:
        - 'breaking-change'
    - title: '⬆️ Dependencies'
      labels:
        - 'dependencies'
    - title: '📝 Documentation'
      labels:
        - 'documentation'
    - title: '🧹 Refactoring & Cleanup'
      labels:
        - 'refactoring'
        - 'cleanup'
    - title: '🔄 CI/CD'
      labels:
        - 'ci'
        - 'cd'
    - title: '🛠️ Maintenance'
      labels:
        - 'maintenance'
        - 'chore'
    - title: '🔒 Security'
      labels:
        - 'security'
    - title: '🧪 Tests'
      labels:
        - 'test'
    - title: '📦 Other Changes'
      labels:
        - '*'

